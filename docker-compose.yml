# Full-stack deployment for a single VPS:
#   app (Django/gunicorn) + postgres + ollama + minio
#
# Services reach each other by name (postgres, ollama, minio) over the private
# compose network. Only the app and MinIO console are exposed to the host.
#
# Quick start (see VPS_DEPLOY.md for the full walkthrough):
#   cp .env.example .env        # fill in DJANGO_SECRET_KEY etc.
#   docker compose up -d --build
#   docker compose exec ollama ollama pull ${OLLAMA_MODEL_ID:-llama3.2:3b}
#   docker compose exec app python manage.py migrate

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # --- Django ---
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      # --- Databases (grader shared DB + Django system DB on same Postgres) ---
      DATABASE_URL: postgresql://grader:${POSTGRES_PASSWORD:-grader}@postgres:5432/grader
      DJANGO_DB_URL: postgresql://grader:${POSTGRES_PASSWORD:-grader}@postgres:5432/grader_system
      # --- AI client: Ollama ---
      USE_OLLAMA: "True"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL_ID: ${OLLAMA_MODEL_ID:-llama3.2:3b}
      # --- S3 via MinIO ---
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-grader-uploads}
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grader}
      POSTGRES_DB: grader
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the second (Django system) database on first boot.
      - ./deploy/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grader"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: "-1"   # keep the model loaded between requests
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment if the VPS has an NVIDIA GPU (and nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9001:9001"   # web console (S3 API stays internal on :9000)

volumes:
  pgdata:
  ollama-models:
  minio-data:
